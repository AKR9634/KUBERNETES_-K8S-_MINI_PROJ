apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes_test_app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubernetes_test_app
  template:
    metadata:
      labels:
        app: kubernetes_test_app
    spec:
      containers:
      - name: kubernetes_test_app
        image: kubernetes_test_app:latest
        imagePullPolicy: Never
        # image: akr6723/kubernetes_test_app
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "64Mi"
            cpu: "200m"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes_test_app
spec:
  selector:
    app: kubernetes_test_app
  ports:
  - port: 8080
    targetPort: 5000

